<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>It Watches You</title>
<style>
  body { margin:0; overflow:hidden; background:black; }
  canvas { background:#111; display:block; margin:0 auto; }
  #msg {
    position:fixed; top:40%; width:100%; text-align:center;
    color:white; font-family:monospace; font-size:24px;
    text-shadow:0 0 10px red;
    opacity:0; transition:opacity 1s;
  }
  #glitch {
    position:fixed; inset:0; background:rgba(255,0,0,0.1);
    mix-blend-mode:screen; opacity:0; pointer-events:none;
  }
</style>
</head>
<body>
<div id="msg"></div>
<div id="glitch"></div>
<canvas id="game" width="900" height="400"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");
const msg = document.getElementById("msg");
const glitch = document.getElementById("glitch");

let state = "intro"; // intro → monologue → chase
let timer = 0;

// Player
let player = { x:50, y:300, vx:0, vy:0, onGround:false };

// Monster
let monster = { x:-200, y:300, speed:0 };

// Controls
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Text sequence
const lines = [
  "Hello.",
  "I see you.",
  "You enjoy life, don’t you?",
  "Running. Laughing. Breathing.",
  "I don’t get to do that.",
  "I only watch.",
  "But tonight…",
  "I want to feel alive too."
];

let lineIndex = 0;
function showLine(text, delay=2000) {
  msg.textContent = text;
  msg.style.opacity = 1;
  setTimeout(()=> msg.style.opacity = 0, delay);
}

// Physics
function updatePlayer() {
  if (state === "chase") {
    if (keys["w"]) player.vy = -8;
    if (keys["d"]) player.vx = 4;
  }

  player.vy += 0.4; // gravity
  player.x += player.vx;
  player.y += player.vy;

  if (player.y > 300) {
    player.y = 300;
    player.vy = 0;
    player.onGround = true;
  } else player.onGround = false;

  player.vx *= 0.8;
}

// Monster AI
function updateMonster() {
  if (state !== "chase") return;
  monster.speed += 0.02;
  monster.x += monster.speed;

  if (monster.x > player.x - 40) {
    msg.textContent = "IT GOT YOU";
    msg.style.opacity = 1;
    state = "dead";
  }
}

// Glitch effect
function doGlitch() {
  if (Math.random() < 0.1) {
    glitch.style.opacity = 0.3;
    setTimeout(()=> glitch.style.opacity = 0, 100);
  }
}

// Draw
function draw() {
  ctx.clearRect(0,0,c.width,c.height);

  // ground
  ctx.fillStyle="#222";
  ctx.fillRect(0,340,900,60);

  // player
  ctx.fillStyle="white";
  ctx.fillRect(player.x, player.y-40, 30, 40);

  // monster
  if (state === "chase" || state === "dead") {
    ctx.fillStyle="red";
    ctx.fillRect(monster.x, monster.y-40, 40, 40);
  }
}

// Game loop
function loop() {
  timer++;

  if (state === "intro") {
    if (timer === 60) showLine(lines[lineIndex]);
    if (timer > 200) {
      timer = 0;
      lineIndex++;
      if (lineIndex < lines.length) {
        showLine(lines[lineIndex]);
      } else {
        state = "chase";
        msg.textContent = "";
        monster.x = -100;
        monster.speed = 2;
      }
    }
  }

  if (state === "chase") doGlitch();

  updatePlayer();
  updateMonster();
  draw();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
